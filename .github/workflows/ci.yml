name: CI

on:
  push:
    branches: [main, pocketbase-migration]
  pull_request:
    branches: [main, pocketbase-migration]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint + typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Vitest (jsdom components)
        run: pnpm test

      - name: Download PocketBase binary
        run: pnpm pb:setup

      - name: Vitest (PocketBase domain)
        run: pnpm test:pb
