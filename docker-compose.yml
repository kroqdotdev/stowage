services:
  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile.pocketbase
    restart: unless-stopped
    ports:
      - "${POCKETBASE_HOST_PORT:-8090}:8090"
    volumes:
      - ./pb_data:/pb_data
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8090/api/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_PORT: ${APP_PORT:-3000}
    restart: unless-stopped
    depends_on:
      pocketbase:
        condition: service_healthy
    environment:
      HOSTNAME: 0.0.0.0
      PORT: ${APP_PORT:-3000}
      POCKETBASE_URL: http://pocketbase:8090
      NEXT_PUBLIC_POCKETBASE_URL: ${NEXT_PUBLIC_POCKETBASE_URL:-http://localhost:8090}
      POCKETBASE_SUPERUSER_EMAIL: ${POCKETBASE_SUPERUSER_EMAIL}
      POCKETBASE_SUPERUSER_PASSWORD: ${POCKETBASE_SUPERUSER_PASSWORD}
      STORAGE_LIMIT_GB: ${STORAGE_LIMIT_GB:-}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
    ports:
      - "${APP_HOST_PORT:-3000}:${APP_PORT:-3000}"

  caddy:
    image: caddy:2-alpine
    profiles: ["tls"]
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      pocketbase:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      APP_PORT: ${APP_PORT:-3000}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
