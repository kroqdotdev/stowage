name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"

          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)." >&2
            exit 1
          fi

          if [[ "$TAG_VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Vitest (jsdom components)
        run: pnpm test

      - name: Download PocketBase binary
        run: pnpm pb:setup

      - name: Vitest (PocketBase domain)
        run: pnpm test:pb

  docker:
    name: Publish Docker images
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (app)
        id: app_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/stowage-app
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Docker metadata (pocketbase)
        id: pb_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/stowage-pocketbase
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Docker metadata (caddy)
        id: caddy_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/stowage-caddy
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and publish app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.app_meta.outputs.tags }}
          labels: ${{ steps.app_meta.outputs.labels }}

      - name: Build and publish PocketBase image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.pocketbase
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.pb_meta.outputs.tags }}
          labels: ${{ steps.pb_meta.outputs.labels }}

      - name: Build and publish Caddy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.caddy
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.caddy_meta.outputs.tags }}
          labels: ${{ steps.caddy_meta.outputs.labels }}

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - verify
      - docker
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Build release notes from changelog
        shell: bash
        env:
          VERSION: ${{ needs.verify.outputs.version }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          CHANGELOG_SECTION="$(mktemp)"
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" {found=1; print; next}
            found && $0 ~ "^## \\[" {exit}
            found {print}
          ' CHANGELOG.md > "$CHANGELOG_SECTION"

          if [ ! -s "$CHANGELOG_SECTION" ]; then
            echo "CHANGELOG.md is missing a section for version $VERSION." >&2
            exit 1
          fi

          {
            echo "## Docker images"
            echo
            echo "- \`ghcr.io/$OWNER/stowage-app:$VERSION\`"
            echo "- \`ghcr.io/$OWNER/stowage-pocketbase:$VERSION\`"
            echo "- \`ghcr.io/$OWNER/stowage-caddy:$VERSION\`"
            echo
            echo "## Deployment bundle"
            echo
            echo "- \`docker-compose.release.yml\`"
            echo
            cat "$CHANGELOG_SECTION"
          } > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          prerelease: ${{ needs.verify.outputs.prerelease == 'true' }}
          files: |
            docker-compose.release.yml
            .env.example
