services:
  app:
    image: ghcr.io/kroqdotdev/stowage-app:${STOWAGE_VERSION:-latest}
    restart: unless-stopped
    environment:
      HOSTNAME: 0.0.0.0
      PORT: ${APP_PORT:-3000}
      POCKETBASE_URL: ${POCKETBASE_URL:-http://pocketbase:8090}
      NEXT_PUBLIC_POCKETBASE_URL: ${NEXT_PUBLIC_POCKETBASE_URL:-http://localhost:8090}
      POCKETBASE_SUPERUSER_EMAIL: ${POCKETBASE_SUPERUSER_EMAIL}
      POCKETBASE_SUPERUSER_PASSWORD: ${POCKETBASE_SUPERUSER_PASSWORD}
      STORAGE_LIMIT_GB: ${STORAGE_LIMIT_GB:-}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
    ports:
      - "${APP_HOST_BIND:-127.0.0.1}:${APP_HOST_PORT:-3000}:${APP_PORT:-3000}"

  pocketbase:
    profiles: ["pocketbase", "full"]
    image: ghcr.io/kroqdotdev/stowage-pocketbase:${STOWAGE_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${POCKETBASE_HOST_BIND:-127.0.0.1}:${POCKETBASE_HOST_PORT:-8090}:8090"
    volumes:
      - ${POCKETBASE_DATA_DIR:-./pb_data}:/pb_data
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8090/api/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  caddy:
    profiles: ["full"]
    image: ghcr.io/kroqdotdev/stowage-caddy:${STOWAGE_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      pocketbase:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      APP_PORT: ${APP_PORT:-3000}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
